name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure temporary SQLite storage
        run: echo "DATABASE_URL=$RUNNER_TEMP/daily-ci.db" >> "$GITHUB_ENV"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10.9.2

      - name: Install locked dependencies
        run: npm ci

      - name: Check Svelte and TypeScript
        run: bash scripts/run-without-network.sh npm run check

      - name: Run Vitest
        run: bash scripts/run-without-network.sh npm run test:unit

      - name: Install Playwright Chromium
        run: npm exec -- playwright install --with-deps chromium

      - name: Run Playwright
        run: bash scripts/run-without-network.sh npm run test:e2e

      - name: Build production adapter
        run: bash scripts/run-without-network.sh npm run build
